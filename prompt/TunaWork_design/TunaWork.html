<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TunaWork — 労働者向けアプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; text-wrap: pretty; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
    background: #E6ECEA;
    background-image: radial-gradient(circle at 20% 10%, #EEF3F1 0%, #DDE6E3 60%, #D4DEDB 100%);
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  ruby rt {
    font-size: 0.52em; font-weight: 500; color: inherit; opacity: 0.78;
    letter-spacing: 0; margin-bottom: 1px; user-select: none;
  }
  .tw-nofuri rt { display: none; }
  .tw-noscroll::-webkit-scrollbar { display: none; }
  .tw-scroll::-webkit-scrollbar { width: 0; display: none; }
  .tw-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  input::placeholder { color: var(--tw-muted); opacity: 0.8; }
  button { -webkit-tap-highlight-color: transparent; }
  @keyframes tw-sheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes tw-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tw-blink { 0%, 60%, 100% { opacity: 0.25; } 30% { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tw-ui.jsx"></script>
<script type="text/babel" src="tw-data.jsx"></script>
<script type="text/babel" src="tw-screens-a.jsx"></script>
<script type="text/babel" src="tw-screens-b.jsx"></script>
<script type="text/babel" src="tw-screens-c.jsx"></script>
<script type="text/babel" src="tw-consult.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": [
    "#2E8BD6",
    "#1C5C97",
    "#E1EEF9"
  ],
  "accent": [
    "#FB7551",
    "#FFE6DF"
  ],
  "furigana": true
}/*EDITMODE-END*/;

// ── Bottom tab bar ─────────────────────────────────────────
function BottomNav({ tab, setTab }) {
  const items = [
    { k: 'find', label: 'さがす', icon: Ic.search },
    { k: 'jobs', label: 'しごと', icon: Ic.brief },
    { k: 'learn', label: 'そうだん', icon: Ic.support },
    { k: 'docs', label: 'しょるい', icon: Ic.doc },
    { k: 'me', label: 'マイ', icon: Ic.user },
  ];
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-start', justifyContent: 'space-around',
      padding: '9px 6px 24px', background: 'rgba(255,255,255,0.92)',
      backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
      borderTop: '1px solid var(--tw-line)', flexShrink: 0, zIndex: 5,
    }}>
      {items.map(it => {
        const on = tab === it.k;
        const c = on ? 'var(--tw-primary)' : 'rgba(23,59,55,0.42)';
        return (
          <button key={it.k} onClick={() => setTab(it.k)} style={{
            border: 'none', background: 'none', cursor: 'pointer', fontFamily: 'inherit',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '4px 8px', flex: 1,
          }}>
            <it.icon s={25} c={c} w={on ? 2.3 : 2} />
            <span style={{ fontSize: 11, fontWeight: on ? 800 : 700, color: c }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('find');
  const [detail, setDetail] = useState(null);
  const [rating, setRating] = useState(null);
  const [consult, setConsult] = useState(null);       // null | 'ai' | 'human'
  const [consultSeed, setConsultSeed] = useState(null);
  const [applied, setApplied] = useState(['j2']); // j2 already applied (shows in しごと)

  const openConsult = (mode, seed) => { setConsultSeed(seed || null); setConsult(mode); };

  const rootVars = {
    '--tw-primary': t.palette[0],
    '--tw-primary-dark': t.palette[1],
    '--tw-primary-soft': t.palette[2],
    '--tw-coral': t.accent[0],
    '--tw-coral-soft': t.accent[1],
    '--tw-yellow': '#FFC53D',
    '--tw-ink': '#173B37',
    '--tw-muted': '#6E837F',
    '--tw-bg': '#EEF3F1',
    '--tw-card': '#FFFFFF',
    '--tw-line': 'rgba(23,59,55,0.09)',
    '--tw-num': "'M PLUS Rounded 1c', system-ui",
    '--tw-mono': "ui-monospace, 'SF Mono', Menlo, monospace",
  };

  const apply = (job) => { setApplied(a => a.includes(job.id) ? a : [...a, job.id]); };
  const openRate = (job) => { setDetail(null); setRating(job); };

  const screen = () => {
    switch (tab) {
      case 'find': return <FindScreen onOpen={setDetail} />;
      case 'jobs': return <JobsScreen onOpen={setDetail} onRate={openRate} />;
      case 'learn': return <LearnScreen onConsult={openConsult} />;
      case 'docs': return <DocsScreen />;
      case 'me': return <ProfileScreen />;
      default: return null;
    }
  };

  return (
    <div className={t.furigana ? '' : 'tw-nofuri'} style={{ ...rootVars, minHeight: '100vh' }}>
      {/* page chrome */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '30px 16px 48px', gap: 18 }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 9, fontSize: 22, fontWeight: 800, color: 'var(--tw-ink)', letterSpacing: -0.3 }}>
            <span style={{ width: 30, height: 30, borderRadius: 9, background: 'var(--tw-primary)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 17 }}>🐟</span>
            TunaWork
          </div>
          <div style={{ fontSize: 13, color: 'var(--tw-muted)', fontWeight: 600, marginTop: 6 }}>外国人のための スキマワーク · 労働者アプリ</div>
        </div>

        <IOSDevice>
          <div style={{ height: '100%', position: 'relative', display: 'flex', flexDirection: 'column', background: 'var(--tw-bg)', overflow: 'hidden' }}>
            <div className="tw-scroll" style={{ flex: 1, overflow: 'auto', paddingTop: 54 }}>
              {screen()}
              <div style={{ height: 10 }} />
            </div>
            <BottomNav tab={tab} setTab={setTab} />

            {detail && (
              <JobDetail
                job={detail}
                applied={applied.includes(detail.id)}
                onApply={apply}
                onClose={() => setDetail(null)}
                onSeeReviews={() => {}}
                goDocs={() => { setDetail(null); setTab('docs'); }}
              />
            )}
            {rating && (
              <RatingModal
                job={rating}
                onClose={() => setRating(null)}
                onDone={() => { setRating(null); setTab('jobs'); }}
              />
            )}
            {consult === 'ai' && (
              <ConsultChat
                initialSeed={consultSeed}
                onClose={() => setConsult(null)}
                onHuman={() => setConsult('human')}
              />
            )}
            {consult === 'human' && (
              <HumanConsult onClose={() => setConsult(null)} />
            )}
          </div>
        </IOSDevice>

        <div style={{ fontSize: 11.5, color: 'var(--tw-muted)', fontWeight: 600, opacity: 0.8 }}>やさしい日本語＋ふりがな · 右上の Tweaks で 配色・ふりがな を きりかえ</div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="配色（はいしょく）" />
        <TweakColor label="ベースカラー" value={t.palette}
          options={[
            ["#10B3A3", "#0A6E66", "#DFF4F1"],
            ["#2E8BD6", "#1C5C97", "#E1EEF9"],
            ["#3DA56A", "#1F7A45", "#E0F2E7"],
            ["#9B6BD0", "#6A3FA0", "#EFE7F8"]
          ]}
          onChange={(v) => setTweak('palette', v)} />
        <TweakColor label="さし色（アクセント）" value={t.accent}
          options={[
            ["#FB7551", "#FFE6DF"],
            ["#F59E2B", "#FCEBD2"],
            ["#EC6A9C", "#FCE3ED"]
          ]}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="ことば" />
        <TweakToggle label="ふりがなを 表示" value={t.furigana}
          onChange={(v) => setTweak('furigana', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
